# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm install
      - name: Generate Private Keys
        uses: ./.github/actions/generate-keys
        with:
          gemini-key: ${{ secrets.GOOGLE_GEMINI_KEY }}
          google-oauth-client-id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          api-key: ${{ secrets.FIREBASE_API_KEY }}
          auth-domain: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          project-id: ${{ secrets.FIREBASE_PROJECT_ID }}
          storage-bucket: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          messaging-sender-id: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          app-id: ${{ secrets.FIREBASE_APP_ID }}
          measurement-id: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
      - name: Build Project
        run: npm run build
      - name: Install Firebase Tools
        run: npm install -g firebase-tools
      - name: Deploy to Firebase Hosting
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIGNETAI }}" > /tmp/google-credentials.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/google-credentials.json
          firebase deploy --only hosting --project signetai --non-interactive

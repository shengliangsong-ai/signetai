name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Private Keys
        run: 'echo "export const GOOGLE_OAUTH_CLIENT_ID = \"${{ secrets.VITE_GOOGLE_CLIENT_ID }}\"; export const GOOGLE_GEMINI_KEY = \"${{ secrets.VITE_GOOGLE_GEMINI_KEY }}\";" > src/private_keys.ts'
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIGNETAI }}'
          channelId: live
          projectId: signetai

name: 'Generate Private Keys'
description: 'Generates the private_keys.ts file from secrets'
inputs:
  gemini-key:
    description: 'Google Gemini API Key'
    required: true
  firebase-config:
    description: 'Firebase Config object'
    required: true
runs:
  using: "composite"
  steps:
    - name: Generate Private Keys File
      env:
        GEMINI_KEY: ${{ inputs.gemini-key }}
        FIREBASE_CONFIG: ${{ inputs.firebase-config }}
      shell: bash
      run: |
        printf 'export const GOOGLE_GEMINI_KEY = "%s";\n' "$GEMINI_KEY" > src/private_keys.ts
        printf 'export const firebaseConfig = %s;\n' "$FIREBASE_CONFIG" >> src/private_keys.ts

    - name: DEBUG - Display Generated File Content
      shell: bash
      run: |
        echo "--- Start of generated private_keys.ts ---"
        cat src/private_keys.ts
        echo "--- End of generated private_keys.ts ---"

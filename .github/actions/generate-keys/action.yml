
name: 'Generate Private Keys'
description: 'Generates a private_keys.ts file from secrets'
inputs:
  gemini-key:
    description: 'Google Gemini API Key'
    required: true
  google-oauth-client-id:
    description: 'Google OAuth Client ID'
    required: true
  api-key:
    description: 'Firebase API Key'
    required: true
  auth-domain:
    description: 'Firebase Auth Domain'
    required: true
  project-id:
    description: 'Firebase Project ID'
    required: true
  storage-bucket:
    description: 'Firebase Storage Bucket'
    required: true
  messaging-sender-id:
    description: 'Firebase Messaging Sender ID'
    required: true
  app-id:
    description: 'Firebase App ID'
    required: true
  measurement-id:
    description: 'Firebase Measurement ID'
    required: true
runs:
  using: "composite"
  steps:
    - run: |
        echo "export const GOOGLE_GEMINI_KEY = '${{ inputs.gemini-key }}';" > private_keys.ts
        echo "export const GOOGLE_OAUTH_CLIENT_ID = '${{ inputs.google-oauth-client-id }}';" >> private_keys.ts
        echo "export const FIREBASE_CONFIG = {" >> private_keys.ts
        echo "  apiKey: '${{ inputs.api-key }}'," >> private_keys.ts
        echo "  authDomain: '${{ inputs.auth-domain }}'," >> private_keys.ts
        echo "  projectId: '${{ inputs.project-id }}'," >> private_keys.ts
        echo "  storageBucket: '${{ inputs.storage-bucket }}'," >> private_keys.ts
        echo "  messagingSenderId: '${{ inputs.messaging-sender-id }}'," >> private_keys.ts
        echo "  appId: '${{ inputs.app-id }}'," >> private_keys.ts
        echo "  measurementId: '${{ inputs.measurement-id }}'" >> private_keys.ts
        echo "};" >> private_keys.ts
      shell: bash

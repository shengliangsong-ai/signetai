name: 'Generate Private Keys'
description: 'Generates the private_keys.ts file from secrets'
inputs:
  gemini-key:
    description: 'Google Gemini API Key'
    required: true
  firebase-config:
    description: 'Firebase Config object'
    required: true
runs:
  using: "composite"
  steps:
    - name: Generate Private Keys File
      env:
        GEMINI_KEY: ${{ inputs.gemini-key }}
      shell: bash
      run: |
        # Write the Gemini key using an environment variable.
        printf 'export const GOOGLE_GEMINI_KEY = "%s";\n' "$GEMINI_KEY" > src/private_keys.ts
        
        # Append the Firebase config, injecting the input directly.
        # Single quotes ensure the shell treats the JSON as a literal string.
        printf 'export const firebaseConfig = %s;\n' '${{ inputs.firebase-config }}' >> src/private_keys.ts
